
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Topo Coco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #fff5f8;
            overflow: hidden; /* Voorkom bounce op mobiel */
            position: fixed; /* Voorkom scrollen van de body */
            width: 100%;
            height: 100%;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #ffeef2 0%, #fff5f8 100%);
        }
        /* Custom Leaflet Styling */
        .leaflet-container {
            background: #caf0f8 !important;
            border-radius: 2rem;
            cursor: crosshair !important;
        }
        .custom-label-icon {
            background: transparent;
            border: none;
        }
        .marker-dot {
            width: 20px; 
            height: 20px; 
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .marker-dot.highlighted {
            width: 32px;
            height: 32px;
            margin-left: -6px;
            margin-top: -6px;
            border-width: 4px;
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
            z-index: 9999 !important;
        }
        .marker-label {
            position: absolute;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 11px;
            white-space: nowrap;
            background-color: rgba(255, 255, 255, 0.95);
            border: 2px solid currentColor;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            pointer-events: none;
            z-index: 1000;
        }
        /* Voorkom selectie van tekst op de kaart */
        .leaflet-container {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>

</head>
<body class="gradient-bg">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
